<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        #sidebar {
            width: 300px;
            background-color: #252526;
            border-right: 1px solid #444;
            overflow-y: auto;
            padding: 15px;
            box-sizing: border-box;
        }
        #sidebar h2 {
            color: #ffffff;
            margin-top: 0;
            font-size: 1.2em;
        }
        #search-box {
            width: calc(100% - 20px);
            padding: 8px;
            margin-bottom: 15px;
            background-color: #333;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 4px;
        }
        #sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #sidebar li {
            margin-bottom: 8px;
        }
        #sidebar a {
            text-decoration: none;
            color: #808080;
            display: block;
            padding: 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #sidebar a:hover, #sidebar a.active {
            color: #ffffff;
            background-color: #3a3a3a;
            padding-left: 10px;
            border-radius: 4px;
        }
        #content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        h1, h2, h3, h4, h5, h6 { color: #f0f0f0; }
        p { line-height: 1.6; }
        a { color: #8080ff; }
        code {
            background-color: #333;
            color: #f0f0f0;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
        }
        pre {
            background-color: #333;
            color: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        blockquote {
            border-left: 4px solid #8080ff;
            padding-left: 10px;
            margin-left: 0;
            color: #a0a0a0;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #555;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #3a3a3a;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Documentation Files</h2>
        <input type="text" id="search-box" placeholder="Search documentation...">
        <ul id="file-list">
            <!-- File links will be loaded here by JavaScript -->
        </ul>
    </div>
    <div id="content">

        ];

        const basePath = "C:\Users\Administrator\Documents\GitHub\docs";

        async function fetchMarkdown(filePath) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.text();
            } catch (error) {
                console.error("Error fetching markdown:", error);
                return "Error loading file. Please check the console.";
            }
        }

        async function renderMarkdown(filePath) {
            const markdownContentDiv = document.getElementById('markdown-content');
            markdownContentDiv.innerHTML = 'Loading...';

            try {
                const markdownText = await fetchMarkdown(filePath);
                const htmlContent = marked.parse(markdownText);
                markdownContentDiv.innerHTML = htmlContent;
            } catch (error) {
                markdownContentDiv.innerHTML = `<div>Error loading or rendering file: ${filePath}. ${error.message}</div>`;
            }
        }

        function populateSidebar(files) {
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = '';

            files.forEach(filePath => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${filePath}`;
                a.textContent = filePath.replace(/^files\//, '').replace(/\.md$/, '').replace(/_/g, ' ');
                a.dataset.filePath = filePath;

                a.addEventListener('click', async (event) => {
                    event.preventDefault();
                    document.querySelectorAll('#sidebar a').forEach(link => link.classList.remove('active'));
                    event.target.classList.add('active');

                    await renderMarkdown(filePath);
                    history.pushState(null, '', `#${filePath}`);
                });

                li.appendChild(a);
                fileList.appendChild(li);
            });
        }

        function filterSidebar(searchTerm) {
            const searchLower = searchTerm.toLowerCase();
            const fileLinks = document.querySelectorAll('#sidebar a');

            fileLinks.forEach(link => {
                const text = link.textContent.toLowerCase();
                if (text.includes(searchLower)) {
                    link.style.display = '';
                } else {
                    link.style.display = 'none';
                }
            });
        }

        document.getElementById('search-box').addEventListener('input', (event) => {
            filterSidebar(event.target.value);
        });

        document.addEventListener('DOMContentLoaded', () => {
            const markedScript = document.createElement('script');
            markedScript.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
            markedScript.onload = () => {
                populateSidebar(allMarkdownFiles);

                const initialHash = window.location.hash;
                if (initialHash && initialHash.length > 1) {
                    const initialFilePath = initialHash.substring(1);
                    const fileLinkElement = Array.from(document.querySelectorAll('#sidebar a')).find(a => a.dataset.filePath === initialFilePath);
                    if (fileLinkElement) {
                        fileLinkElement.classList.add('active');
                        renderMarkdown(initialFilePath);
                    } else {
                        document.getElementById('markdown-content').innerHTML = `<div>File not found: ${initialFilePath}</div>`;
                    }
                } else {
                    if (allMarkdownFiles.length > 0) {
                         const firstFileLink = document.querySelector('#sidebar a[data-file-path="' + allMarkdownFiles[0] + '"]');
                         if (firstFileLink) {
                            firstFileLink.classList.add('active');
                            renderMarkdown(allMarkdownFiles[0]);
                         }
                    } else {
                        document.getElementById('markdown-content').innerHTML = 'No documentation files found.';
                    }
                }
            };
            document.head.appendChild(markedScript);
        });

</html>
