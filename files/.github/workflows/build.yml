# `build.yml`

## Purpose
This GitHub Actions workflow file (`build.yml`) defines a CI/CD pipeline for building the Minecraft Legacy Console Edition. It is triggered manually via `workflow_dispatch`. The workflow builds the solution in both 'Release' and 'Debug' configurations for the 'Windows64' platform on a `windows-2022` runner. It checks out the repository, sets up MSBuild, performs the build, and uploads the build artifacts for each configuration.

## Key Classes/Functions
- `actions/checkout@v4`: A GitHub Action that checks out the repository's code.
- `microsoft/setup-msbuild@v2`: A GitHub Action that sets up the MSBuild build system.
- `msbuild`: The command-line tool used to build the C++ project.
- `actions/upload-artifact@v4`: A GitHub Action that uploads build artifacts to be stored with the workflow run.

## Modifiability for Modders
Modders could modify this file to:
- Change the build runner (e.g., to a different Windows version or an Ubuntu runner if the build process supports it).
- Adjust the build configurations or platforms.
- Modify the artifact upload path or naming conventions.
- Add pre-build or post-build steps.

## Related Files
- `CMakeLists.txt`: The main CMake build script for the project.
- `MinecraftConsoles.sln`: The Visual Studio solution file that `msbuild` uses.
- `x64/Release/` and `x64/Debug/`: Directories where the build artifacts are expected to be generated.
- `debug-test.yml` and `nightly.yml`: Other workflow files in the same directory that define different CI/CD processes.
