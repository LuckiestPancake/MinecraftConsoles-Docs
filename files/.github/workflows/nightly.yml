# `nightly.yml`

## Purpose
This GitHub Actions workflow file (`nightly.yml`) is responsible for creating and releasing a nightly build of the Minecraft Legacy Console Edition. It is triggered on a push to the 'main' branch (excluding changes to ignored files) and via manual dispatch. The workflow builds the project in 'Release' mode for 'Windows64', zips the build artifacts, and then uses the `andelf/nightly-release` action to create a GitHub release tagged as 'nightly'. The release includes a description detailing system requirements, installation instructions, and the compiled files.

## Key Classes/Functions
- `actions/checkout@v6`: Checks out the repository code.
- `microsoft/setup-msbuild@v2`: Sets up the MSBuild build environment.
- `MSBuild.exe`: Compiles the solution in Release mode for Windows64.
- `7z`: A command-line utility used to create a zip archive (`LCEWindows64.zip`) of the Release build artifacts.
- `andelf/nightly-release@main`: A GitHub Action used to create and manage GitHub releases, specifically for nightly builds.

## Modifiability for Modders
Modders could modify this file to:
- Change the build configuration (e.g., to include Debug symbols in the nightly release).
- Adjust the archiving command or the files included in the zip.
- Modify the release name, tag, or description content.
- Alter the trigger conditions for the workflow.
- Integrate additional steps like automated testing or deployment to other platforms.

