# `debug-test.yml`

## Purpose
This GitHub Actions workflow file (`debug-test.yml`) is designed to build the project in the 'Debug' configuration for the 'Windows64' platform. It's triggered on manual dispatch (`workflow_dispatch`), when a pull request is opened, reopened, or synchronized, and on push events to the 'main' branch. It specifically ignores changes to `.gitignore`, markdown files, and files within the `.github/` directory to avoid unnecessary builds. The workflow checks out the code, sets up MSBuild, and then executes the build command.

## Key Classes/Functions
- `actions/checkout@v6`: Checks out the repository code.
- `microsoft/setup-msbuild@v2`: Sets up the MSBuild build environment.
- `MSBuild.exe`: The command-line executable for building Visual Studio projects.

## Modifiability for Modders
Modders could modify this file to:
- Change the trigger conditions (e.g., add or remove branches, specify different pull request types).
- Modify the `paths-ignore` to include or exclude specific files/directories from triggering builds.
- Change the build configuration or platform.
- Add steps for running tests or other validation checks after the build.

