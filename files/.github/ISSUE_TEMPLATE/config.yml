# `config.yml`

## Purpose
This file configures various settings for GitHub issues within the repository. It specifies that blank issues are not enabled and provides a link to the project's community Discord server for support and assistance.

## Key Classes/Functions
This file does not contain code and therefore has no key classes or functions. It is a YAML file used for configuring GitHub issue templates.

## Modifiability for Modders
As a YAML configuration file, it can be modified by users with write access to the `.github/ISSUE_TEMPLATE` directory. Changes to this file will affect the issue creation experience, such as enabling or disabling blank issues and managing contact links.

## Related Files
- `.github/ISSUE_TEMPLATE/bug_report.yml`: A template for reporting bugs.
- `.github/ISSUE_TEMPLATE/suggestion_request.yml`: A template for requesting suggestions or features.
